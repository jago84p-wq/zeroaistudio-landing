<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#04040a"/>
  <!-- Z shape -->
  <text x="5" y="25" font-family="'Inter', 'Arial', sans-serif" font-weight="900" font-size="24" fill="#8b5cf6" filter="url(#glow)" letter-spacing="-1">Z</text>
  <!-- Cyan accent dot -->
  <circle cx="24" cy="9" r="2" fill="#06b6d4" opacity="0.9"/>
</svg>
